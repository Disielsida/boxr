      - generic [ref=e118]: Как провести жеребьёвку?
      - generic [ref=e132]:
        - img [ref=e134]
        - generic [ref=e142]: "Для проведения жеребьёвки на платформе BOXR следуйте этому алгоритму: ### Суть процесса Жеребьёвка проводится после официального взвешивания. Основная задача — распределить боксёров по турнирной сетке так, чтобы сильнейшие участники («сеяные») не встретились в первых кругах. ### Детали реализации 1. **Подготовка списка:** Убедитесь, что все участники распределены по корректным весовым категориям (согласно IBA: 48, 51, 54 кг и т.д.). 2. **Рассеивание (Seeding):** * Определите сильнейших боксёров (на основе рейтинга или достижений). * Разведите их в разные части сетки (верхнюю и нижнюю), чтобы их встреча была возможна только в финале или полуфинале (**Правило 15.11**). 3. **Генерация сетки в BOXR:** * Используйте функцию **автоматической жеребьёвки**. Система сама распределит участников, учитывая количество боксёров в категории (4, 8, 16 или 32). * Если боксёров не кратное степени двойки число, система автоматически определит тех, кто проходит в следующий круг без боя (bye). 4. **Проверка ограничений:** Платформа BOXR позволяет настроить «разведение» боксёров из одного клуба или региона, чтобы они не боксировали друг с другом в первом туре. 5. **Публикация:** После завершения жеребьёвки сетки и расписание боёв мгновенно становятся доступны участникам и зрителям в интерфейсе BOXR. **Важно:** В любительском боксе жеребьёвка должна быть прозрачной. После её завершения изменения в сетку вносить нельзя."
