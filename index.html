// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ─── BUTTON ───────────────────────────────────────────────────────────────────
const Button = ({ children, variant = 'primary', size = 'md', onClick, disabled, icon, style: extraStyle }) => {
  const [hovered, setHovered] = useState(false);
  const sizes = { sm: '28px', md: '40px', lg: '52px' };
  const paddings = { sm: '0 14px', md: '0 20px', lg: '0 28px' };
  const fonts = { sm: 'var(--text-sm)', md: 'var(--text-base)', lg: 'var(--text-lg)' };

  let bg, color, border;
  if (variant === 'primary') {
    bg = hovered ? 'var(--ring-700)' : 'var(--ink-900)';
    color = 'var(--paper-100)';
    border = 'none';
  } else if (variant === 'secondary') {
    bg = hovered ? 'var(--ink-900)' : 'transparent';
    color = hovered ? 'var(--paper-100)' : 'var(--ink-900)';
    border = '1px solid var(--ink-900)';
  } else if (variant === 'ghost') {
    bg = hovered ? 'var(--paper-200)' : 'transparent';
    color = 'var(--ink-700)';
    border = 'none';
  } else if (variant === 'danger') {
    bg = hovered ? 'var(--ring-700)' : 'var(--ring-600)';
    color = 'white';
    border = 'none';
  }

  return (
    <button
      onClick={onClick}
      disabled={disabled}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        gap: 8,
        height: sizes[size],
        padding: paddings[size],
        background: bg,
        color,
        border,
        borderRadius: 'var(--radius-sm)',
        fontFamily: 'var(--font-body)',
        fontSize: fonts[size],
        fontWeight: 500,
        cursor: disabled ? 'not-allowed' : 'pointer',
        opacity: disabled ? 0.4 : 1,
        transition: `background var(--duration-fast) var(--ease-out-quart), color var(--duration-fast) var(--ease-out-quart)`,
        whiteSpace: 'nowrap',
        ...extraStyle,
      }}
    >
      {icon && <Icon name={icon} size={16} />}
      {children}
    </button>
  );
};

// BOXR — Screen 11: Live Scoring (dark theme)
const LiveScoringScreen = ({ onNavigate }) => {
  const [fightState, setFightState] = useState('prefight'); // prefight | active | break | ended
  const [round, setRound] = useState(1);
  const [time, setTime] = useState(180); // 3 min
  const [timerRunning, setTimerRunning] = useState(false);
  const [redScore, setRedScore] = useState(10);
  const [blueScore, setBlueScore] = useState(10);
  const [events, setEvents] = useState([]);
  const [aiOpen, setAiOpen] = useState(false);
  const [voiceActive, setVoiceActive] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    if (timerRunning && time > 0) {
      timerRef.current = setTimeout(() => setTime(t => t - 1), 1000);
    } else if (time === 0 && timerRunning) {
      setTimerRunning(false);
      if (round < 3) {
        setFightState('break');
        setTime(60);
      } else {
        setFightState('ended');
      }
    }
    return () => clearTimeout(timerRef.current);
  }, [timerRunning, time]);

  const startFight = () => { setFightState('active'); setTimerRunning(true); };
  const startRound = () => { setFightState('active'); setTimerRunning(true); setTime(180); setRound(r => r + 1); };
  const toggleTimer = () => setTimerRunning(r => !r);

  const addEvent = (type, corner) => {
    const mins = Math.floor((180 - time) / 60);
    const secs = (180 - time) % 60;
    const timestamp = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    const label = { warning: 'Предупреждение', remark: 'Замечание', knockdown: 'Нокдаун', stop: 'Стоп бой' }[type];
    setEvents(e => [{ time: timestamp, text: `${label} — ${corner === 'red' ? '🔴 Красный' : '🔵 Синий'}`, type }, ...e]);
    if (type === 'warning') {
      if (corner === 'red') setRedScore(s => Math.max(7, s - 1));
      else setBlueScore(s => Math.max(7, s - 1));
    }
    if (type === 'knockdown') {
      if (corner === 'red') setRedScore(s => Math.max(7, s - 1));
      else setBlueScore(s => Math.max(7, s - 1));
    }
  };

  const formatTime = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const dark = {
    bg: 'var(--ink-dark-bg)',
    surface: 'var(--ink-dark-surface)',
    text: 'var(--ink-dark-text)',
    muted: 'rgba(242,238,229,0.4)',
    border: 'rgba(242,238,229,0.08)',
  };

  const aiHints = [
    { type: 'info', text: 'Время раунда: 03:00 (мужчины 19–40, разрядные)' },
    { type: 'warning', text: 'Красный получил 2 замечания. Следующее — предупреждение (−1 балл).' },
    { type: 'info', text: 'По правилам IBA: до 3 нокдаунов в раунде — бой останавливается.' },
  ];

  return (
    <div style={{
      height: '100vh', display: 'flex', flexDirection: 'column',
      background: dark.bg, color: dark.text,
      fontFamily: 'var(--font-body)',
      overflow: 'hidden',
    }}>
      {/* Top bar */}
      <div style={{
        height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 24px', borderBottom: `1px solid ${dark.border}`,
        flexShrink: 0,
      }}>
        <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: dark.muted, letterSpacing: '0.1em' }}>
          КУБОК МОСКВЫ · РИНГ 1
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          {[1,2,3].map(r => (
            <div key={r} style={{
              width: 32, height: 6, borderRadius: 3,
              background: r < round ? 'var(--ring-600)' : r === round ? (timerRunning ? 'var(--ring-600)' : 'rgba(178,58,47,0.4)') : dark.border,
              transition: 'background 0.3s',
            }} />
          ))}
        </div>
        <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: dark.muted, letterSpacing: '0.1em' }}>
          БОЙ 12 · РАУНД {round}
        </div>
      </div>

      {/* Main area */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* Red corner */}
        <div style={{
          flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center',
          padding: '24px 32px',
          borderRight: `4px solid rgba(178,58,47,0.6)`,
        }}>
          <div style={{ color: 'var(--ring-600)', fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.15em', marginBottom: 8 }}>
            ● КРАСНЫЙ УГОЛ
          </div>
          <h2 style={{
            fontFamily: 'var(--font-display)',
            fontSize: 'clamp(28px, 3.5vw, 52px)',
            fontWeight: 700, letterSpacing: '-0.02em', lineHeight: 1.1,
            marginBottom: 6,
          }}>Соколов<br/>Алексей</h2>
          <div style={{ color: dark.muted, fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.08em', marginBottom: 32 }}>

// BOXR — Screen 12: AI Assistant Panel (real Claude API)
const AIAssistantPanel = ({ onClose, currentScreen = 'dashboard' }) => {
  const [messages, setMessages] = useState([
    {
      role: 'assistant',
      content: 'Привет! Я AI-помощник BOXR. Знаю правила IBA, могу помочь с жеребьёвкой, документами и любыми вопросами о приложении. Чем могу помочь?',
      timestamp: new Date(),
    }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [voiceActive, setVoiceActive] = useState(false);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  const screenContext = {
    dashboard: 'организатор просматривает главный дашборд с активными турнирами',
    draw: 'организатор работает с жеребьёвкой турнира',
    participants: 'организатор управляет списком участников',
    scoring: 'судья ведёт судейство боя в реальном времени',
    register: 'тренер регистрирует боксёра через OCR',
  };

  const suggestions = {
    dashboard: ['Как провести жеребьёвку?', 'Что такое рассеивание в сетке?', 'Какие документы нужны от боксёра?'],
    draw: ['Объясни принцип рассеивания', 'Что если участников нечётное число?', 'Как формируются пары в 1/8?'],
    participants: ['Какие документы обязательны?', 'Как проверить разряд?', 'Требования МРТ по IBA'],
    scoring: ['Сколько нокдаунов до остановки?', 'Что такое RSC?', 'Правила предупреждений'],

  useEffect(() => { scrollToBottom(); }, [messages]);

  const sendMessage = async (text) => {
    const userText = text || input.trim();
    if (!userText) return;
    setInput('');

    const userMsg = { role: 'user', content: userText, timestamp: new Date() };
    setMessages(m => [...m, userMsg]);
    setLoading(true);

    try {
      const systemPrompt = `Ты — AI-помощник BOXR, платформы для организации боксёрских турниров. 
      
Контекст: ${screenContext[currentScreen] || 'пользователь работает с приложением BOXR'}.

Твои знания:
- Правила IBA (International Boxing Association) для любительского бокса
- Правила организации турниров, весовые категории, регламенты
- Функции приложения BOXR: жеребьёвка, OCR регистрация, расписание, судейство
- Весовые категории мужчин: 46, 48, 51, 54, 57, 60, 63.5, 67, 71, 75, 80, 86, 92 кг
- Шлемы для мужчин 19-40 лет не используются (правило IBA с 2016)
- Раунды: 3 раунда по 3 минуты для разрядных боёв
- Нокдаун: 3 нокдауна в раунде = остановка боя (правило трёх нокдаунов)

Отвечай кратко и по делу. Используй структуру: сначала суть, потом детали. 
При цитировании правил указывай номер пункта как "Правило X.X".
Отвечай на русском языке.`;

      const response = await window.claude.complete({
        messages: [
          ...messages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content })),
          { role: 'user', content: userText }

        system: systemPrompt,
      });

      setMessages(m => [...m, {
        role: 'assistant',
        content: response,
        timestamp: new Date(),

      setMessages(m => [...m, {
        role: 'assistant',
        content: 'Извините, произошла ошибка. Попробуйте ещё раз.',
        timestamp: new Date(),
        error: true,
      }]);

      setLoading(false);

  const formatContent = (content) => {

    const parts = content.split(/(Правило \d+\.\d+)/g);
    return parts.map((part, i) => {

            color: 'var(--ring-600)', fontWeight: 500,

  return (

        borderBottom: '1px solid var(--paper-300)',

        flexShrink: 0,
      }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
            <div style={{
              width: 28, height: 28, borderRadius: '50%',
              background: 'var(--ink-900)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <Icon name="bot" size={14} color="var(--paper-100)" />
            </div>
            <div style={{ fontWeight: 600, fontSize: 'var(--text-sm)' }}>AI-помощник BOXR</div>
            <div style={{
              width: 7, height: 7, borderRadius: '50%',
              background: 'var(--success)',
              animation: 'pulse 2s infinite',
            }} />
          </div>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-300)', letterSpacing: '0.08em' }}>
            КОНТЕКСТ: {(screenContext[currentScreen] || 'ПРИЛОЖЕНИЕ BOXR').toUpperCase().slice(0, 30)}
          </div>
        </div>
        <button onClick={onClose} style={{

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "landingVariation": 1,
  "showGrain": false,
  "accentColor": "#1f5da4"
}/*EDITMODE-END*/;

const App = () => {
  const [screen, setScreen] = useState('landing');
  const [isDark, setIsDark] = useState(false);
  const [aiOpen, setAiOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => { document.body.classList.toggle('dark-mode', isDark); }, [isDark]);
  useEffect(() => { document.body.classList.toggle('grain', tweaks.showGrain); }, [tweaks.showGrain]);
  useEffect(() => { document.documentElement.style.setProperty('--ring-600', tweaks.accentColor); }, [tweaks.accentColor]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, value) => {
    const updates = typeof key === 'object' ? key : { [key]: value };
    setTweaks(t => ({ ...t, ...updates }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: updates }, '*');
  };

  const navigate = (s) => {
    setScreen(s);
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  };

  const fullPageScreens = ['landing', 'login', 'register_screen', 'public_tournaments', 'create_tournament', 'register', 'scoring'];
  const isFullPage = fullPageScreens.includes(screen);

  const renderScreen = () => {
    const props = { onNavigate: navigate, onAI: () => setAiOpen(true), isDark, onDark: () => setIsDark(d => !d) };
    switch (screen) {
      case 'landing': return <LandingScreen {...props} variation={tweaks.landingVariation} />;
      case 'login': return <LoginScreen {...props} />;
      case 'register_screen': return <LoginScreen {...props} mode="register" />;
      case 'public_tournaments': return <PublicTournamentsScreen {...props} />;
      case 'dashboard': return <DashboardScreen {...props} />;
      case 'create_tournament': return <CreateTournamentScreen {...props} />;
      case 'participants': return <TournamentManageScreen {...props} initialTab="participants" />;
      case 'draw': return <TournamentManageScreen {...props} initialTab="draw" />;
      case 'schedule': return <TournamentManageScreen {...props} initialTab="schedule" />;
      case 'results': return <TournamentManageScreen {...props} initialTab="results" />;
      case 'register': return <RegisterBoxerScreen {...props} />;
      case 'boxer_profile': return <BoxerProfileScreen {...props} />;
      case 'trainer_dashboard': return <TrainerDashboardScreen {...props} />;
      case 'scoring': return <LiveScoringScreen {...props} />;
      case 'ai': return (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%' }}>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontFamily:'var(--font-display)', fontSize:'var(--text-2xl)', marginBottom:16, fontWeight:700 }}>AI-помощник</div>
            <Button onClick={() => setAiOpen(true)} icon="bot">Открыть AI-помощник</Button>
          </div>
        </div>
      );
      default: return <DashboardScreen {...props} />;
    }
  };

  const breadcrumbs = {
    dashboard: 'Главная / Дашборд', tournaments: 'Главная / Мои турниры',
    participants: 'Турнир / Участники', draw: 'Турнир / Жеребьёвка',
    schedule: 'Турнир / Расписание', results: 'Турнир / Результаты',
    documents: 'Инструменты / Документы', ai: 'Инструменты / AI',
    boxer_profile: 'Боксёры / Профиль', trainer_dashboard: 'Главная / Дашборд',
    register: 'Действия / Регистрация',
  };
  const isTrainer = screen === 'trainer_dashboard' || screen === 'boxer_profile';

  return (
    <div style={{ height:'100vh', overflow:'hidden', position:'relative' }}>
      {isFullPage ? (
        <div id="app-scroll" ref={scrollRef} style={{ height:'100vh', overflowY:'auto' }}>
          {renderScreen()}
        </div>
      ) : (
        <div className="sidebar-layout">
          <Sidebar active={screen} onNavigate={navigate} role={isTrainer ? 'trainer' : 'organizer'} />
          <div className="sidebar-main">
            <TopBar breadcrumb={breadcrumbs[screen] || 'Главная'} onAI={() => setAiOpen(true)} onDark={() => setIsDark(d => !d)} isDark={isDark} />
            <div id="app-scroll" ref={scrollRef} style={{ flex:1, overflowY:'auto', background:'var(--paper-100)' }}>
              <div style={{ animation:'fadeSlideIn 0.4s var(--ease-out-expo)' }} key={screen}>
                {renderScreen()}
              </div>
            </div>
          </div>
        </div>
      )}

      {aiOpen && (
        <>
          <div onClick={() => setAiOpen(false)} style={{
            position:'fixed', inset:0, background:'rgba(26,20,61,0.35)',
            backdropFilter:'blur(4px)', zIndex:490,
          }} />
          <AIAssistantPanel onClose={() => setAiOpen(false)} currentScreen={screen} />
        </>
      )}

      {!isFullPage && !aiOpen && <AIFloatingButton onClick={() => setAiOpen(true)} />}

      {tweaksVisible && (
        <TweaksPanel onClose={() => { setTweaksVisible(false); window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); }}>
          <TweakSection title="Landing">
            <TweakRadio label="Вариация лендинга" value={tweaks.landingVariation}
              options={[{ label:'1 — Тёмный', value:1 }, { label:'2 — Светлый', value:2 }, { label:'3 — Минимал', value:3 }]}
              onChange={v => setTweak('landingVariation', v)} />
          </TweakSection>
          <TweakSection title="Навигация">
            <TweakSelect label="Перейти на экран" value={screen}
              options={[
                { label:'Лендинг', value:'landing' },
                { label:'Вход', value:'login' },
                { label:'Турниры (публичные)', value:'public_tournaments' },
                { label:'Дашборд организатора', value:'dashboard' },
                { label:'Создание турнира', value:'create_tournament' },
                { label:'Участники', value:'participants' },
                { label:'Жеребьёвка', value:'draw' },
                { label:'Расписание', value:'schedule' },
                { label:'Результаты', value:'results' },
                { label:'Регистрация боксёра (OCR)', value:'register' },
                { label:'Профиль боксёра', value:'boxer_profile' },
                { label:'Дашборд тренера', value:'trainer_dashboard' },
                { label:'Live Scoring', value:'scoring' },
                { label:'AI-помощник', value:'ai' },
              ]}
              onChange={v => navigate(v)} />
          </TweakSection>
          <TweakSection title="Дизайн">
            <TweakColor label="Акцент" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
            <TweakToggle label="Тёмная тема" value={isDark} onChange={v => setIsDark(v)} />
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
