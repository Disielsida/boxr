services:
  postgres:
    image: postgres:16
    container_name: boxr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: boxr
      POSTGRES_PASSWORD: boxr
      POSTGRES_DB: boxr
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxr -d boxr"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
